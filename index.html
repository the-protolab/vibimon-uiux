<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UI Playground</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #121212;
            --panel: #d7d7d7;
            --panel-dark: #8a8a8a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            min-height: 100%;
            font-family: 'VT323', 'Courier New', monospace;
            background: #111111;
            color: #e8e8e8;
        }

        .page {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 16px;
        }

        .content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 32px;
        }

        h1 {
            font-size: 36px;
            font-weight: normal;
        }

        .nav {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .ctrl-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 200px;
            height: 56px;
            border: 2px solid #5a5a5a;
            border-radius: 8px;
            color: var(--ink);
            background: linear-gradient(180deg, var(--panel), var(--panel-dark));
            font-family: 'VT323', 'Courier New', monospace;
            font-size: 24px;
            line-height: 1;
            text-decoration: none;
            cursor: pointer;
            user-select: none;
        }

        .ctrl-btn:active {
            transform: translateY(1px);
            filter: brightness(0.92);
        }
    </style>
</head>
<body>
    <main class="page">
        <div class="content">
            <h1>UI Playground</h1>
            <nav class="nav">
                <a href="ui1.html" class="ctrl-btn">UI 1</a>
                <a href="ui2.html" class="ctrl-btn">UI 2</a>
            </nav>
        </div>
    </main>
</body>
</html>
